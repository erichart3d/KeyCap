<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>KeyCap Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=VT323&family=Press+Start+2P&family=Orbitron:wght@500;700;900&family=Major+Mono+Display&family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@500;700&family=Fira+Code:wght@400;500;700&family=Space+Mono:wght@400;700&family=Chakra+Petch:wght@500;700&family=Rajdhani:wght@500;700&family=Silkscreen:wght@400;700&family=Audiowide&family=Monoton&family=Unica+One&family=Bungee&family=Saira+Condensed:wght@500;700&display=swap" rel="stylesheet">
<script src="/editor/theme-runtime.js"></script>
<style>
:root {
  --bg: #ff2e9a;
  --border: #00f0ff;
  --glow: #b967ff;
  --bg-rgb: 255, 46, 154;
  --border-rgb: 0, 240, 255;
  --font-weight: 700;
  --font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
  --keycap-scale: 1;
  --caption-scale: 1;
  --caption-gap: 6px;
}

html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
  font-family: var(--font-family);
  -webkit-font-smoothing: antialiased;
}

#overlay {
  position: fixed;
  display: flex;
  gap: 14px;
  max-width: 92vw;
  flex-wrap: nowrap;
  pointer-events: none;
}

.key {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--caption-gap);
  animation-name: glitchin;
  animation-duration: 0.28s;
  animation-timing-function: steps(3, end);
  will-change: transform, opacity;
}

.key.fading {
  animation-name: glitchout;
  animation-duration: 0.5s;
  animation-timing-function: steps(4, end);
  animation-fill-mode: forwards;
}

.caption,
.keycap {
  position: relative;
  overflow: visible;
  isolation: isolate;
  white-space: nowrap;
}

.caption {
  font-size: calc(16px * var(--caption-scale));
  font-weight: var(--font-weight);
  padding: 2px 8px;
}

.keycap {
  font-weight: var(--font-weight);
  padding: 8px 16px;
  font-size: calc(22px * var(--keycap-scale));
}

.key.annotated .keycap {
  padding: 16px 30px;
  font-size: calc(34px * var(--keycap-scale));
}

.caption::before,
.keycap::before,
.caption::after,
.keycap::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  display: none;
}

@keyframes glitchin {
  0% { transform: translate(-8px, 4px); opacity: 0; }
  33% { transform: translate(6px, -3px); opacity: 1; }
  66% { transform: translate(-2px, 1px); }
  100% { transform: translate(0, 0); }
}

@keyframes glitchout {
  0% { opacity: 1; transform: translate(0, 0) scaleY(1); }
  40% { opacity: 0.85; transform: translate(5px, 0) scaleY(1); }
  70% { opacity: 0.45; transform: translate(-4px, 0) scaleY(0.3); }
  100% { opacity: 0; transform: translate(0, 0) scaleY(0.02); }
}

@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeout { from { opacity: 1; } to { opacity: 0; } }
@keyframes slidein { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes slideout { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-8px); opacity: 0; } }
@keyframes popin {
  0% { transform: scale(0.8); opacity: 0; }
  60% { transform: scale(1.06); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes popout { from { transform: scale(1); opacity: 1; } to { transform: scale(0); opacity: 0; } }
@keyframes snapout { from { transform: scaleY(1); opacity: 1; } to { transform: scaleY(0); opacity: 0; } }
@keyframes risein { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes riseout { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-12px); opacity: 0; } }
@keyframes markerwipein { from { opacity: 0; clip-path: inset(0 100% 0 0); transform: translateY(8px); } to { opacity: 1; clip-path: inset(0 0 0 0); transform: translateY(0); } }
@keyframes markerwipeout { from { opacity: 1; clip-path: inset(0 0 0 0); } to { opacity: 0; clip-path: inset(0 0 0 100%); } }
@keyframes chalkwritein { from { opacity: 0; filter: blur(6px); transform: translateY(4px) scale(0.98); } to { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); } }
@keyframes chalkwriteout { from { opacity: 1; filter: blur(0); } to { opacity: 0; filter: blur(3px); } }
@keyframes softenin { from { opacity: 0; filter: blur(12px); transform: scale(0.96); } to { opacity: 1; filter: blur(0); transform: scale(1); } }
@keyframes softenout { from { opacity: 1; filter: blur(0); } to { opacity: 0; filter: blur(10px); } }
@keyframes slamin { 0% { opacity: 0; transform: translateY(24px) scale(0.86); } 68% { opacity: 1; transform: translateY(-4px) scale(1.05); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes slamout { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(18px) scale(0.92); } }
@keyframes overshootin { 0% { opacity: 0; transform: translateY(8px) scale(0.88); } 72% { opacity: 1; transform: translateY(-2px) scale(1.08); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes overshootout { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.9); } }
@keyframes splitin { from { opacity: 0; transform: scaleX(0.45) translateY(6px); filter: blur(4px); } to { opacity: 1; transform: scaleX(1) translateY(0); filter: blur(0); } }
@keyframes splitout { from { opacity: 1; transform: scaleX(1); } to { opacity: 0; transform: scaleX(0.2); } }
@keyframes scanin { 0% { opacity: 0; filter: brightness(1.8) blur(8px); transform: translateX(-10px); } 100% { opacity: 1; filter: brightness(1) blur(0); transform: translateX(0); } }
@keyframes scanout { from { opacity: 1; filter: brightness(1); } to { opacity: 0; filter: brightness(1.6) blur(6px); } }
@keyframes flashcutin { 0% { opacity: 0; filter: brightness(2.2); } 45% { opacity: 1; filter: brightness(1.4); } 100% { opacity: 1; filter: brightness(1); } }
@keyframes flashcutout { from { opacity: 1; filter: brightness(1); } to { opacity: 0; filter: brightness(2); } }
@keyframes glitchburstin { 0% { opacity: 0; transform: translate(-10px, 4px) skewX(-10deg); } 35% { opacity: 1; transform: translate(6px, -2px) skewX(8deg); } 100% { opacity: 1; transform: translate(0, 0) skewX(0deg); } }
@keyframes glitchburstout { from { opacity: 1; transform: translate(0, 0); } to { opacity: 0; transform: translate(6px, -1px) scaleX(1.08); } }
@keyframes pixelpopin { 0% { opacity: 0; transform: scale(0.7); filter: contrast(1.8); } 60% { opacity: 1; transform: scale(1.08); filter: contrast(1.2); } 100% { opacity: 1; transform: scale(1); filter: contrast(1); } }
@keyframes pixelpopout { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.78); } }
@keyframes crtsmearin { from { opacity: 0; transform: scaleX(1.18) translateY(4px); filter: blur(8px); } to { opacity: 1; transform: scaleX(1) translateY(0); filter: blur(0); } }
@keyframes crtsmearout { from { opacity: 1; transform: scaleX(1); filter: blur(0); } to { opacity: 0; transform: scaleX(1.12); filter: blur(7px); } }

body.anim-fade .key { animation-name: fadein; animation-duration: calc(0.25s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-out; }
body.anim-fade .key.fading { animation-name: fadeout; animation-duration: calc(0.4s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-slide .key { animation-name: slidein; animation-duration: calc(0.25s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-out; }
body.anim-slide .key.fading { animation-name: slideout; animation-duration: calc(0.35s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-pop .key { animation-name: popin; animation-duration: calc(0.3s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-out; }
body.anim-pop .key.fading { animation-name: popout; animation-duration: calc(0.25s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-snap .key { animation-duration: 0s; }
body.anim-snap .key.fading { animation-name: snapout; animation-duration: calc(0.2s * var(--anim-speed-multiplier, 1)); animation-timing-function: cubic-bezier(0.5, 0, 1, 0.5); }
body.anim-rise .key { animation-name: risein; animation-duration: calc(0.3s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-out; }
body.anim-rise .key.fading { animation-name: riseout; animation-duration: calc(0.4s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-marker-wipe .key { animation-name: markerwipein; animation-duration: calc(0.28s * var(--anim-speed-multiplier, 1)); animation-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1); }
body.anim-marker-wipe .key.fading { animation-name: markerwipeout; animation-duration: calc(0.24s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-chalk-write .key { animation-name: chalkwritein; animation-duration: calc(0.34s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-out; }
body.anim-chalk-write .key.fading { animation-name: chalkwriteout; animation-duration: calc(0.24s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-soften .key { animation-name: softenin; animation-duration: calc(0.28s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-out; }
body.anim-soften .key.fading { animation-name: softenout; animation-duration: calc(0.26s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-slam .key { animation-name: slamin; animation-duration: calc(0.3s * var(--anim-speed-multiplier, 1)); animation-timing-function: cubic-bezier(0.2, 0.9, 0.22, 1.1); }
body.anim-slam .key.fading { animation-name: slamout; animation-duration: calc(0.2s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-overshoot .key { animation-name: overshootin; animation-duration: calc(0.32s * var(--anim-speed-multiplier, 1)); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
body.anim-overshoot .key.fading { animation-name: overshootout; animation-duration: calc(0.22s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-split-in .key { animation-name: splitin; animation-duration: calc(0.26s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-out; transform-origin: center; }
body.anim-split-in .key.fading { animation-name: splitout; animation-duration: calc(0.22s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-scan-in .key { animation-name: scanin; animation-duration: calc(0.28s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-out; }
body.anim-scan-in .key.fading { animation-name: scanout; animation-duration: calc(0.24s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-flash-cut .key { animation-name: flashcutin; animation-duration: calc(0.18s * var(--anim-speed-multiplier, 1)); animation-timing-function: steps(2, end); }
body.anim-flash-cut .key.fading { animation-name: flashcutout; animation-duration: calc(0.16s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }
body.anim-glitch-burst .key { animation-name: glitchburstin; animation-duration: calc(0.24s * var(--anim-speed-multiplier, 1)); animation-timing-function: steps(3, end); }
body.anim-glitch-burst .key.fading { animation-name: glitchburstout; animation-duration: calc(0.22s * var(--anim-speed-multiplier, 1)); animation-timing-function: steps(3, end); }
body.anim-pixel-pop .key { animation-name: pixelpopin; animation-duration: calc(0.22s * var(--anim-speed-multiplier, 1)); animation-timing-function: steps(3, end); }
body.anim-pixel-pop .key.fading { animation-name: pixelpopout; animation-duration: calc(0.18s * var(--anim-speed-multiplier, 1)); animation-timing-function: steps(2, end); }
body.anim-crt-smear .key { animation-name: crtsmearin; animation-duration: calc(0.26s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-out; }
body.anim-crt-smear .key.fading { animation-name: crtsmearout; animation-duration: calc(0.22s * var(--anim-speed-multiplier, 1)); animation-timing-function: ease-in; }

@media (prefers-reduced-motion: reduce) {
  body[class*="anim-"] .key {
    animation-name: fadein !important;
    animation-duration: 0.16s !important;
    animation-timing-function: ease-out !important;
    transform: none !important;
    filter: none !important;
    clip-path: none !important;
  }
  body[class*="anim-"] .key.fading {
    animation-name: fadeout !important;
    animation-duration: 0.16s !important;
    animation-timing-function: ease-in !important;
    transform: none !important;
    filter: none !important;
    clip-path: none !important;
  }
}
</style>
<style id="theme-css"></style>
</head>
<body>
<div id="overlay"></div>
<script>
const FADE_DURATION_MS = 500;

let CFG = {
  position: 'bottom-center',
  margin: 60,
  scale: 1,
  opacity: 1,
  maxKeys: 4,
  lifetime: 2200,
  animationSpeed: 1,
  showCaptions: true,
};

function toColor(value) {
  if (!value) return null;
  return value.startsWith('#') ? value : `#${value}`;
}

function normalizeHex(hex, fallback = '#000000') {
  const raw = String(hex || '').trim().replace(/^#/, '');
  if (/^[0-9a-fA-F]{6}$/.test(raw)) return `#${raw.toLowerCase()}`;
  if (/^[0-9a-fA-F]{3}$/.test(raw)) return `#${raw.split('').map((char) => char + char).join('').toLowerCase()}`;
  return fallback;
}

function hexToRgb(hex) {
  const normalized = normalizeHex(hex);
  const raw = normalized.slice(1);
  return [
    parseInt(raw.slice(0, 2), 16),
    parseInt(raw.slice(2, 4), 16),
    parseInt(raw.slice(4, 6), 16),
  ].join(', ');
}

const params = new URLSearchParams(location.search);
const URL_OVERRIDES = {};
if (params.has('position')) URL_OVERRIDES.position = params.get('position').toLowerCase();
if (params.has('margin')) URL_OVERRIDES.margin = parseInt(params.get('margin'), 10);
if (params.has('scale')) URL_OVERRIDES.scale = parseFloat(params.get('scale'));
if (params.has('opacity')) URL_OVERRIDES.opacity = parseFloat(params.get('opacity'));
if (params.has('max-keys')) URL_OVERRIDES.maxKeys = parseInt(params.get('max-keys'), 10);
if (params.has('lifetime')) URL_OVERRIDES.lifetime = parseInt(params.get('lifetime'), 10);
if (params.has('bg')) URL_OVERRIDES.bg = toColor(params.get('bg'));
if (params.has('border')) URL_OVERRIDES.border = toColor(params.get('border'));
if (params.has('glow')) URL_OVERRIDES.glow = toColor(params.get('glow'));

function applyConfig(incoming) {
  Object.assign(CFG, incoming, URL_OVERRIDES);

  const theme = CFG.resolvedTheme || ThemeRuntime.DEFAULT_THEME;
  ThemeRuntime.applyThemeCss(
    document.getElementById('theme-css'),
    theme,
    { keycap: '.keycap', caption: '.caption' },
  );

  const keycapFill = ThemeRuntime.getFillRepresentativeColor(theme.keycap?.fill) || '#e8e6df';
  const keycapBorder = theme.keycap?.outline?.color || keycapFill;
  const keycapGlow = theme.keycap?.glow?.color
    || theme.keycap?.shadow?.layers?.find((layer) => !layer.inset)?.color
    || keycapBorder;
  const root = document.documentElement;
  root.style.setProperty('--bg', keycapFill);
  root.style.setProperty('--border', keycapBorder);
  root.style.setProperty('--glow', keycapGlow);
  root.style.setProperty('--bg-rgb', hexToRgb(keycapFill));
  root.style.setProperty('--border-rgb', hexToRgb(keycapBorder));
  root.style.setProperty('--font-weight', CFG.fontWeight ?? 700);
  root.style.setProperty('--font-family', CFG.fontFamily ?? "'Menlo', 'Consolas', 'Courier New', monospace");
  root.style.setProperty('--keycap-scale', CFG.keycapScale ?? 1);
  root.style.setProperty('--caption-scale', CFG.captionScale ?? 1);
  root.style.setProperty('--caption-gap', `${CFG.captionGap ?? 6}px`);
  const speed = Math.max(0.2, Number(CFG.animationSpeed) || 1);
  root.style.setProperty('--anim-speed-multiplier', (1 / speed).toFixed(3));

  const anim = CFG.fade ?? 'glitch';
  document.body.classList.remove(
    'anim-glitch', 'anim-fade', 'anim-slide', 'anim-pop', 'anim-snap', 'anim-rise',
    'anim-marker-wipe', 'anim-chalk-write', 'anim-soften', 'anim-slam', 'anim-overshoot',
    'anim-split-in', 'anim-scan-in', 'anim-flash-cut', 'anim-glitch-burst', 'anim-pixel-pop', 'anim-crt-smear'
  );
  document.body.classList.add(`anim-${anim}`);

  const overlay = document.getElementById('overlay');
  const [vert, horiz = 'center'] = (CFG.position || 'bottom-center').split('-');
  const marginY = CFG.marginY ?? CFG.margin ?? 60;
  const marginX = CFG.marginX ?? 0;
  overlay.style.opacity = CFG.opacity;

  if (vert === 'top') {
    overlay.style.top = `${marginY}px`;
    overlay.style.bottom = 'auto';
  } else if (vert === 'middle') {
    overlay.style.top = '50%';
    overlay.style.bottom = 'auto';
  } else {
    overlay.style.bottom = `${marginY}px`;
    overlay.style.top = 'auto';
  }

  overlay.style.alignItems = vert === 'top' ? 'flex-start' : 'flex-end';
  const originV = vert === 'top' ? 'top' : vert === 'middle' ? 'center' : 'bottom';
  const vt = vert === 'middle' ? 'translateY(-50%) ' : '';

  if (horiz === 'left') {
    overlay.style.left = `${marginX}px`;
    overlay.style.right = 'auto';
    overlay.style.transform = `${vt}scale(${CFG.scale})`;
    overlay.style.transformOrigin = `${originV} left`;
  } else if (horiz === 'right') {
    overlay.style.right = `${marginX}px`;
    overlay.style.left = 'auto';
    overlay.style.transform = `${vt}scale(${CFG.scale})`;
    overlay.style.transformOrigin = `${originV} right`;
  } else {
    overlay.style.left = '50%';
    overlay.style.right = 'auto';
    overlay.style.transform = `translateX(calc(-50% + ${marginX}px)) ${vt}scale(${CFG.scale})`;
    overlay.style.transformOrigin = `${originV} center`;
  }
}

function addKey(label, description) {
  const overlay = document.getElementById('overlay');
  while (overlay.children.length >= CFG.maxKeys) {
    overlay.firstElementChild?.remove();
  }

  const showCaptions = CFG.showCaptions !== false;
  const hasAnnotation = !!description;
  const showCaption = hasAnnotation && showCaptions;

  const wrap = document.createElement('div');
  wrap.className = hasAnnotation ? 'key annotated' : 'key';

  const keycap = document.createElement('div');
  keycap.className = 'keycap';
  keycap.textContent = label;

  let caption = null;
  if (showCaption) {
    caption = document.createElement('div');
    caption.className = 'caption';
    caption.textContent = description;
  }

  const below = (CFG.captionPosition ?? 'above') === 'below';
  if (caption && !below) wrap.appendChild(caption);
  wrap.appendChild(keycap);
  if (caption && below) wrap.appendChild(caption);

  overlay.appendChild(wrap);

  setTimeout(() => {
    wrap.classList.add('fading');
    setTimeout(() => wrap.remove(), FADE_DURATION_MS);
  }, CFG.lifetime);
}

async function boot() {
  try {
    const response = await fetch('/api/config');
    if (response.ok) applyConfig(await response.json());
    else applyConfig({});
  } catch (_) {
    applyConfig({});
  }
  connect();
}

function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'key') addKey(data.label, data.description);
      if (data.type === 'config') applyConfig(data);
    } catch (_) {}
  };

  ws.onclose = () => setTimeout(connect, 1000);
  ws.onerror = () => {
    try { ws.close(); } catch (_) {}
  };
}

boot();
</script>
</body>
</html>
